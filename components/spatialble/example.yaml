# Example ESPHome config using the spatialble component.
#
# USAGE — pick one source option:

# Option A — from local path
# external_components:
#   - source: /path/to/your/repo/components
#     components: [spatialble]

# Option B — from GitHub (create a repo with 'components/' at root)
# external_components:
#   - source: github://YourUser/your-repo
#     components: [spatialble]

substitutions:
  name: spatialble-esp32-1

esphome:
  name: ${name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password

ota:
  - platform: esphome
    password: !secret ota_password

esp32_ble_tracker:
  scan_parameters:
    active: false
    continuous: true

spatialble:
  topic: spatialble
  heartbeat_interval: 10s
