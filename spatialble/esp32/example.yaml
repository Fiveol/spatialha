# Example ESPHome YAML showing how to use the spatialble component.
#
# Place this entire spatialble/esp32 directory in your ESPHome config under
#   esphome:
#     external_components:
#       - source: path/to/spatialble/esp32
#
# Or copy spatialble_ble_server.h and .cpp into your own project.

substitutions:
  name: spatialble-esp32-1

esphome:
  name: ${name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password

# Enable built-in OTA for firmware updates
ota:
  - platform: esphome
    password: !secret ota_password

# Enable BLE tracking stack (required by spatialble)
esp32_ble_tracker:
  scan_parameters:
    active: false
    continuous: true

# The spatialble component — publishes BLE advertisements to MQTT
spatialble:
  topic: spatialble
  heartbeat_interval: 10s
